<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Au revoir</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        .container { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); text-align: center; max-width: 500px; }
        h1 { color: #f5576c; }
        p { color: #555; font-size: 18px; line-height: 1.6; }
        .user-id { color: #999; font-size: 14px; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Au revoir, {{name}}</h1>
        <p>Votre compte directeur a été supprimé. Les accès de gestion ne sont plus actifs.</p>
        <p>Administration — Magasin du Coin</p>
        <p class="user-id">ID : {{user_id}}</p>
        <p class="user-id">Courriel : {{email}}</p>
        <p class="user-id">Supprimé le {{deletion_date}}</p>
    </div>
</body>
</html>
