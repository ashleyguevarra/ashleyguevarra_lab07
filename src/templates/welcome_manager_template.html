<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenue direction</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        .container { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); text-align: center; max-width: 500px; }
        h1 { color: #f5576c; margin-bottom: 20px; }
        p { color: #555; font-size: 18px; line-height: 1.6; }
        .user-id { color: #999; font-size: 14px; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Bienvenue {{name}}</h1>
        <p>Bienvenue dans le comité de direction. Votre accès gestionnaire est activé pour le Magasin du Coin.</p>
        <p>Cordialement,</p>
        <p>Administration — Magasin du Coin</p>
        <p class="user-id">ID : {{user_id}}</p>
        <p class="user-id">Courriel : {{email}}</p>
        <p class="user-id">Créé le {{creation_date}}</p>
    </div>
</body>
</html>
